name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  integration:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        artemis:
          - 2.30.0-alpine
          - 2.37.0-alpine
          - 2.44.0-alpine
          - latest-alpine
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:integration
        env:
          ARTEMIS_IMAGE: apache/activemq-artemis:${{ matrix.artemis }}

  # Stable required-status target so branch protection does not depend on the
  # matrix leg names, which change whenever the version list changes.
  integration-gate:
    needs: integration
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: test "${{ needs.integration.result }}" = "success"
