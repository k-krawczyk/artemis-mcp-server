name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  # Required for npm trusted publishing (OIDC) and provenance.
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      # Trusted publishing needs npm 11.5.1 or newer.
      - run: npm install -g npm@latest
      - run: npm ci
      - name: Verify the package version matches the release tag
        if: github.event_name == 'release'
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          pkg=$(node -p "require('./package.json').version")
          if [ "$TAG" != "v$pkg" ]; then
            echo "release tag $TAG does not match package.json version $pkg" >&2
            exit 1
          fi
      - run: npm test
      - run: npm run build
      - run: npm publish
